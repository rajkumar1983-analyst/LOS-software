spring.application.name=aggregatorservice
server.port=${SERVER_PORT:8085}
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/los-realm
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
customer.service.url=${CUSTOMER_SERVICE_URL}
loan.service.url=${LOAN_SERVICE_URL}

# Circuit breaker for the dashboard aggregation (loan + customer fan-out)
resilience4j.circuitbreaker.instances.aggregator.sliding-window-size=10
resilience4j.circuitbreaker.instances.aggregator.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aggregator.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aggregator.register-health-indicator=true

# Expose actuator so circuit-breaker state is visible
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always