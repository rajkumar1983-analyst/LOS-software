version: "3.9"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Admin@2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - banking-net

  customerservice:
    build: .
    container_name: customerservice
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=N7_Banking;encrypt=False;TrustServerCertificate=True
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Admin@2026
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.SQLServerDialect
    depends_on:
      - sqlserver
    networks:
      - banking-net

networks:
  banking-net:
    driver: bridge
