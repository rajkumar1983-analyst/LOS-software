services:

  api-gateway:
    image: api-gateway
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      CUSTOMER_SERVICE_URL: http://customerservice:8081
      LOAN_SERVICE_URL: http://loanservice:8082
      AGGREGATOR_SERVICE_URL: http://aggregatorservice:8085
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      KEYCLOAK_ISSUER_URI: http://keycloak.local:9090/realms/los-realm
    extra_hosts:
      - "keycloak.local:host-gateway"
    depends_on:
      - customerservice
      - loanservice
      - aggregatorservice

  customerservice:
    image: customerservice
    build:
      context: ./customerservice
    container_name: customerservice
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=N7_Banking;encrypt=False;TrustServerCertificate=True
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Test@1234
      KEYCLOAK_ISSUER_URI: http://keycloak.local:9090/realms/los-realm
    extra_hosts:
      - "keycloak.local:host-gateway"

  loanservice:
    image: loanservice
    build:
      context: ./loanservice/loanservice
    container_name: loanservice
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SPRING_LOAN_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=lending;encrypt=False;TrustServerCertificate=True
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Test@1234
      CUSTOMER_SERVICE_URL: http://customerservice:8081
      KEYCLOAK_ISSUER_URI: http://keycloak.local:9090/realms/los-realm
    extra_hosts:
      - "keycloak.local:host-gateway"
    depends_on:
      - customerservice

  aggregatorservice:
    image: aggregatorservice
    build:
      context: ./aggregatorservice/aggregatorservice
    container_name: aggregatorservice
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CUSTOMER_SERVICE_URL: http://customerservice:8081
      LOAN_SERVICE_URL: http://loanservice:8082
      KEYCLOAK_ISSUER_URI: http://keycloak.local:9090/realms/los-realm
    extra_hosts:
      - "keycloak.local:host-gateway"
    depends_on:
      - customerservice
      - loanservice

  los-frontend:
    image: los-frontend
    build:
      context: ./LOS
    container_name: los-frontend
    ports:
      - "5173:80"
    depends_on:
      - aggregatorservice
      - customerservice
      - loanservice
  
  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

networks:
  default:
    name: banking-network