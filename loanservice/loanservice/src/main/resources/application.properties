spring.application.name=loanservice
logging.level.org.springframework.web=INFO

#H2 DB
#spring.h2.console.enabled = true
#spring.datasource.platform = h2
#spring.datasource.url = jdbc:h2:mem:bills

springdoc.packagesToScan=com.banking.loanservice.controller
#spring.datasource.url=jdbc:sqlserver://localhost;databaseName=lending;encrypt=False;TrustServerCertificate=True;
#spring.datasource.username= admin
#spring.datasource.password=Test@1234

spring.datasource.url=${SPRING_LOAN_DATASOURCE_URL}
spring.datasource.username= ${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.show-sql=false
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServer2022Dialect
spring.jpa.hibernate.ddl-auto = none
spring.jpa.open-in-view=false
server.port=${SERVER_PORT:8082}
customer.service.url=${CUSTOMER_SERVICE_URL}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# Default works for host runs (external listener); compose overrides with the internal listener.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Key is a String; value is the LoanCreatedEvent POJO -> serialize as JSON.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Tracing OFF by default: no Zipkin collector runs, so every request was failing to
# POST spans to localhost:9411 (Connection refused). To re-enable, run a Zipkin
# collector, point management.zipkin.tracing.endpoint at it (e.g. http://host.docker.internal:9411),
# and raise the sampling probability.
management.tracing.sampling.probability=0.0

management.endpoints.web.exposure.include=*