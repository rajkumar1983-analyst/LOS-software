spring.application.name=api-gateway

server.port=8080

# NOTE: Spring Cloud Gateway 5.x (Spring Boot 4 / Spring Cloud 2025.1.x) moved
# route config under: spring.cloud.gateway.server.webflux.*
# The old "spring.cloud.gateway.routes[...]" prefix is silently ignored.

# Service URIs are parameterized: defaults work for local (host) runs;
# docker-compose overrides them with container hostnames.

# Collapse duplicate CORS headers: both the gateway and the downstream
# services emit Access-Control-* headers, so dedupe to a single value.
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# Customer Service Route (customers + lookups both live in customerservice)
spring.cloud.gateway.server.webflux.routes[0].id=customerservice
spring.cloud.gateway.server.webflux.routes[0].uri=${CUSTOMER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/customers/**,/api/lookups/**

# Loan Service Route
spring.cloud.gateway.server.webflux.routes[1].id=loanservice
spring.cloud.gateway.server.webflux.routes[1].uri=${LOAN_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/loans/**

# Aggregator Route (its controller is mapped at /dashboard, not /api/dashboard)
spring.cloud.gateway.server.webflux.routes[2].id=aggregatorservice
spring.cloud.gateway.server.webflux.routes[2].uri=${AGGREGATOR_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/dashboard/**

# CORS (browser calls the gateway cross-origin from the SPA)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Keycloak JWT Validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://keycloak.local:9090/realms/los-realm}

# Expose the gateway routes actuator endpoint for debugging
management.endpoints.web.exposure.include=health,info,gateway

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=INFO
